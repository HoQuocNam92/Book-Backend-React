openapi: 3.0.3

info:
  title: AlphaBooks API
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Authentication APIs

paths:
  /auth/sign-up:
    post:
      tags: [Auth]
      summary: Đăng ký
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        201:
          description: Đăng ký thành công

  /auth/sign-in:
    post:
      tags: [Auth]
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        200:
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        200:
          description: Refresh token thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Gửi email reset mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        200:
          description: Email đã được gửi

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset mật khẩu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        200:
          description: Reset mật khẩu thành công

components:
  schemas:
    SignUpRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Nam
        email:
          type: string
          example: nam@gmail.com
        password:
          type: string
          example: 123456

    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: nam@gmail.com
        password:
          type: string
          example: 123456

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AccessTokenResponse:
      type: object
      properties:
        accessToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          example: nam@gmail.com

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          example: 123456
